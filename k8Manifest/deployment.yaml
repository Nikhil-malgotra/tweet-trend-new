#Deployment
apiVersion: apps/v1
kind: Deployment  
metadata:
  name: tweettrend-deployment
  namespace: webapp
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: tweettrend
  template:
    metadata:
      labels:
        app: tweettrend
    spec:
      serviceAccountName: jenkins
      containers:
        - name: tweettrend
          image: nikhilmalgotra/demo-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10   

---
#service
apiVersion: v1
kind: Service
metadata:
  name: tweettrend-svc
  namespace: webapp
spec:
  selector:
   app: tweettrend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP


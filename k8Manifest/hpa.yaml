# HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tweettrend-hpa
  namespace: webapp
spec:
  minReplicas: 2
  maxReplicas: 6
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tweettrend-deployment
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: 
          type: Utilization
          averageUtilization: 40
    - type: Resource
      resource:
        name: memory  
        target: 
          type: Utilization
          averageUtilization: 40
